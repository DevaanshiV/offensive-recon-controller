<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECON INTERCEPT ENGINE</title>
    <!-- Bootstrap 5 Darkly theme (premium dark styling) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ----------------------------------------------------------
           GLOBAL & SIDEBAR STYLES
        ---------------------------------------------------------- */
        body {
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }

        /* ---------- Sidebar ---------- */
        #sidebar {
            min-width: 260px;
            max-width: 260px;
            background: #131a24;
            color: #e0e6ed;
            transition: all 0.3s;
            height: 100vh;
            position: sticky;
            top: 0;
            border-right: 1px solid #2a3a4a;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
        }
        #sidebar .brand {
            text-align: center;
            padding: 0 1.5rem 1.5rem 1.5rem;
            border-bottom: 1px solid #2a3a4a;
        }
        #sidebar .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00e0ff;
            text-shadow: 0 0 20px rgba(0, 224, 255, 0.6);
            margin: 0;
        }
        #sidebar .brand small {
            display: block;
            color: #7b8c9d;
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-top: 4px;
        }
        #sidebar .nav-links {
            flex: 1;
            padding: 2rem 0;
        }
        #sidebar .nav-links .nav-item {
            display: block;
            padding: 0.8rem 2rem;
            color: #b0c4d9;
            border-left: 4px solid transparent;
            transition: 0.2s;
            text-decoration: none;
            font-weight: 500;
        }
        #sidebar .nav-links .nav-item:hover {
            background: #1e2b38;
            color: #fff;
            border-left-color: #00e0ff;
        }
        #sidebar .nav-links .nav-item i {
            width: 28px;
            text-align: center;
            margin-right: 10px;
            color: #00e0ff;
        }
        #sidebar .footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5a6f7e;
            border-top: 1px solid #2a3a4a;
        }

        /* ---------- Main Content ---------- */
        #content {
            flex: 1;
            padding: 2rem 3rem;
            background: #0b0e14;
            min-height: 100vh;
        }

        /* ---------- Glowing Header ---------- */
        .glow-header {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 224, 255, 0.5), 0 0 60px rgba(0, 224, 255, 0.2);
            margin-bottom: 0.5rem;
        }
        .glow-header small {
            font-size: 1rem;
            font-weight: 300;
            color: #8aa0b5;
            letter-spacing: 2px;
            text-shadow: none;
            display: block;
        }

        /* ---------- Input & Controls ---------- */
        .input-container {
            background: #131a24;
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid #2a3a4a;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        .input-group-custom {
            background: #0b0e14;
            border-radius: 50px;
            padding: 0.25rem;
            border: 1px solid #2a3a4a;
            transition: 0.3s;
        }
        .input-group-custom:focus-within {
            border-color: #00e0ff;
            box-shadow: 0 0 20px rgba(0, 224, 255, 0.2);
        }
        .input-group-custom input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
        }
        .input-group-custom input:focus {
            box-shadow: none;
            background: transparent;
            color: #fff;
        }
        .input-group-custom .input-group-text {
            background: transparent;
            border: none;
            color: #00e0ff;
            font-size: 1.2rem;
            padding-right: 0.5rem;
        }

        /* ---------- Toggle Buttons (Scan Type) ---------- */
        .scan-type-toggle .btn {
            border-radius: 30px;
            padding: 0.5rem 1.8rem;
            margin: 0 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #1e2b38;
            color: #b0c4d9;
            border: 1px solid #2a3a4a;
            transition: 0.3s;
        }
        .scan-type-toggle .btn:hover {
            background: #2a3a4a;
            color: #fff;
        }
        .scan-type-toggle .btn.active {
            background: #00e0ff;
            color: #0b0e14;
            border-color: #00e0ff;
            box-shadow: 0 0 30px rgba(0, 224, 255, 0.4);
        }
        .scan-type-toggle .btn i {
            margin-right: 8px;
        }

        /* ---------- Execute Button ---------- */
        .btn-execute {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 0.8rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(0, 114, 255, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-execute:hover {
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(0, 114, 255, 0.7);
            color: #fff;
        }
        .btn-execute:disabled {
            opacity: 0.6;
            transform: scale(0.97);
        }

        /* ---------- Radar Sweep Animation (overlay) ---------- */
        #radar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        #radar-overlay.active {
            display: block;
        }
        #radar-overlay .radar-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            margin-left: -300px;
            margin-top: -300px;
            border-radius: 50%;
            border: 2px solid rgba(0, 224, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 224, 255, 0.1);
            animation: pulse 2s infinite;
        }
        #radar-overlay .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            margin-left: -300px;
            margin-top: -300px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(0,224,255,0) 0%, rgba(0,224,255,0.15) 50%, rgba(0,224,255,0) 100%);
            animation: sweep 2s linear infinite;
            transform-origin: center;
        }
        @keyframes sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ---------- Results Table ---------- */
        .results-container {
            margin-top: 2.5rem;
            background: #131a24;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #2a3a4a;
        }
        .results-container .table {
            margin-bottom: 0;
            color: #e0e6ed;
        }
        .results-container .table thead th {
            border-bottom: 2px solid #2a3a4a;
            color: #8aa0b5;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .results-container .table td {
            vertical-align: middle;
        }
        .badge-status {
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-weight: 600;
        }
        .badge-success {
            background: #00c853;
            color: #fff;
        }
        .badge-danger {
            background: #d32f2f;
            color: #fff;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 768px) {
            #sidebar {
                min-width: 80px;
                max-width: 80px;
                text-align: center;
            }
            #sidebar .brand h1 { font-size: 1rem; }
            #sidebar .brand small { display: none; }
            #sidebar .nav-links .nav-item span { display: none; }
            #sidebar .nav-links .nav-item i { margin-right: 0; }
            #content { padding: 1rem; }
            .glow-header { font-size: 1.8rem; }
            .input-container { padding: 1rem; }
            .scan-type-toggle .btn { padding: 0.4rem 1rem; font-size: 0.8rem; margin: 4px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- SIDEBAR -->
        <nav id="sidebar">
            <div class="brand">
                <h1>RECON</h1>
                <h1 style="font-size:1.2rem; text-shadow:0 0 30px rgba(0,224,255,0.8);">INTERCEPT</h1>
                <small>ENGINE v2.0</small>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active"><i class="fas fa-home"></i> <span>Dashboard</span></a>
                <a href="#" class="nav-item"><i class="fas fa-network-wired"></i> <span>Scans</span></a>
                <a href="#" class="nav-item"><i class="fas fa-chart-bar"></i> <span>Reports</span></a>
                <a href="#" class="nav-item"><i class="fas fa-cog"></i> <span>Settings</span></a>
            </div>
            <div class="footer">
                <i class="fas fa-shield-alt" style="color:#00e0ff; font-size:1.2rem; display:block; margin-bottom:4px;"></i>
                SECURE · FAST · STEALTH
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div id="content">
            <div class="glow-header">
                RECON INTERCEPT ENGINE
                <small>Next‑Generation Attack Surface Discovery</small>
            </div>

            <!-- Input & Controls -->
            <div class="input-container">
                <form id="scan-form">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label text-muted small">TARGET</label>
                            <div class="input-group-custom input-group">
                                <span class="input-group-text"><i class="fas fa-crosshairs"></i></span>
                                <input type="text" class="form-control" id="target-input" placeholder="example.com or 192.168.1.1" value="scanme.insecure.org">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small">SCAN TYPE</label>
                            <div class="scan-type-toggle btn-group" role="group">
                                <button type="button" class="btn active" data-scan="port"><i class="fas fa-plug"></i> Port</button>
                                <button type="button" class="btn" data-scan="directory"><i class="fas fa-folder-tree"></i> Directory</button>
                                <button type="button" class="btn" data-scan="subdomain"><i class="fas fa-sitemap"></i> Subdomain</button>
                            </div>
                        </div>
                        <div class="col-md-2 text-end">
                            <button type="submit" class="btn-execute" id="execute-btn">
                                <i class="fas fa-play"></i> Execute
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Results Area -->
            <div id="results-area" class="results-container">
                <div id="result-placeholder" class="text-center text-muted py-5">
                    <i class="fas fa-radar fa-3x mb-3" style="color:#2a3a4a;"></i>
                    <p>Awaiting recon command...</p>
                </div>
                <div id="result-content" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0"><i class="fas fa-list-ul me-2" style="color:#00e0ff;"></i>Scan Results</h5>
                        <span class="badge bg-secondary" id="result-count">0</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover" id="results-table">
                            <thead>
                                <tr id="table-header"></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Radar Overlay -->
    <div id="radar-overlay">
        <div class="radar-circle"></div>
        <div class="radar-sweep"></div>
    </div>

    <!-- Bootstrap & dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script>
        (function() {
            'use strict';

            // DOM refs
            const form = document.getElementById('scan-form');
            const targetInput = document.getElementById('target-input');
            const executeBtn = document.getElementById('execute-btn');
            const scanTypeBtns = document.querySelectorAll('.scan-type-toggle .btn');
            const radarOverlay = document.getElementById('radar-overlay');
            const placeholder = document.getElementById('result-placeholder');
            const resultContent = document.getElementById('result-content');
            const tableHeader = document.getElementById('table-header');
            const tableBody = document.getElementById('table-body');
            const resultCount = document.getElementById('result-count');

            let currentScanType = 'port';

            // Toggle scan type selection
            scanTypeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    scanTypeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentScanType = this.dataset.scan;
                });
            });

            // Handle form submit
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const target = targetInput.value.trim();
                if (!target) {
                    alert('Please enter a target.');
                    return;
                }
                // Disable button, show radar
                executeBtn.disabled = true;
                executeBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Scanning...';
                radarOverlay.classList.add('active');

                // Hide previous results
                placeholder.style.display = 'none';
                resultContent.style.display = 'none';

                // Build request
                const payload = {
                    target: target,
                    scan_type: currentScanType
                };

                fetch('/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    // Stop radar
                    radarOverlay.classList.remove('active');
                    executeBtn.disabled = false;
                    executeBtn.innerHTML = '<i class="fas fa-play"></i> Execute';

                    if (data.error) {
                        alert('Error: ' + data.error);
                        placeholder.style.display = 'block';
                        return;
                    }

                    // Render results
                    renderResults(data);
                })
                .catch(err => {
                    radarOverlay.classList.remove('active');
                    executeBtn.disabled = false;
                    executeBtn.innerHTML = '<i class="fas fa-play"></i> Execute';
                    alert('Request failed: ' + err.message);
                    placeholder.style.display = 'block';
                });
            });

            // Render results based on scan type
            function renderResults(data) {
                const results = data.results;
                if (!results || results.length === 0) {
                    placeholder.style.display = 'block';
                    placeholder.innerHTML = '<i class="fas fa-exclamation-triangle fa-2x mb-3" style="color:#ff9800;"></i><p>No results returned.</p>';
                    return;
                }

                // Determine columns based on scan_type
                let columns = [];
                if (data.scan_type === 'port') {
                    columns = ['Port', 'Service', 'Status'];
                } else if (data.scan_type === 'directory') {
                    columns = ['Path', 'Status Code', 'Content Length', 'Found'];
                } else if (data.scan_type === 'subdomain') {
                    columns = ['Subdomain', 'Resolved', 'IP Address'];
                }

                // Build table header
                tableHeader.innerHTML = columns.map(col => `<th>${col}</th>`).join('');

                // Build table rows
                let rowsHtml = '';
                results.forEach(item => {
                    let row = '<tr>';
                    if (data.scan_type === 'port') {
                        row += `<td>${item.port}</td>`;
                        row += `<td>${item.service}</td>`;
                        const badge = item.badge === 'success' ? 'badge-success' : 'badge-danger';
                        row += `<td><span class="badge-status ${badge}">${item.status}</span></td>`;
                    } else if (data.scan_type === 'directory') {
                        row += `<td>${item.path}</td>`;
                        row += `<td>${item.status_code}</td>`;
                        row += `<td>${item.length}</td>`;
                        const badge = item.badge === 'success' ? 'badge-success' : 'badge-danger';
                        const label = item.found ? 'Found' : 'Not Found';
                        row += `<td><span class="badge-status ${badge}">${label}</span></td>`;
                    } else if (data.scan_type === 'subdomain') {
                        row += `<td>${item.subdomain}</td>`;
                        const badge = item.badge === 'success' ? 'badge-success' : 'badge-danger';
                        const label = item.resolved ? 'Resolved' : 'Unresolved';
                        row += `<td><span class="badge-status ${badge}">${label}</span></td>`;
                        row += `<td>${item.ip || '-'}</td>`;
                    }
                    row += '</tr>';
                    rowsHtml += row;
                });

                tableBody.innerHTML = rowsHtml;
                resultCount.textContent = results.length;
                resultContent.style.display = 'block';
                placeholder.style.display = 'none';
            }

            // On page load, set default active scan type
            document.querySelector('.scan-type-toggle .btn[data-scan="port"]')?.classList.add('active');
            currentScanType = 'port';

        })();
    </script>
</body>
</html>
